[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -m "not legacy_persona"
markers =
    unit: Unit tests
    integration: Integration tests
    security: Security tests
    slow: Slow running tests
    validation: Validation tests
    legacy_persona: Legacy Mingus demo persona tests (Maya/Marcus/Jasmine); excluded from default CI via -m "not legacy_persona"
