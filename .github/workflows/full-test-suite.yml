name: Full Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend / pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mingus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/mingus_test
      PGUSER: test
      PGPASSWORD: test
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: mingus_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      FLASK_ENV: testing
      PYTHONPATH: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f "requirements-testing 2.txt" ]; then
            pip install -r "requirements-testing 2.txt"
          fi
          pip install \
            pytest \
            pytest-cov \
            pytest-html \
            pytest-xdist \
            PyJWT \
            psycopg2-binary \
            aiohttp \
            psutil \
            numpy \
            faker \
            flask-login \
            marshmallow \
            selenium \
            alembic

      - name: Wait for Postgres to be ready
        run: |
          python - <<'PY'
          import os, time
          import psycopg2
          url = os.environ["DATABASE_URL"]
          for i in range(60):
              try:
                  conn = psycopg2.connect(url)
                  conn.close()
                  print("Postgres ready")
                  break
              except Exception as exc:
                  print(f"waiting for postgres ({i + 1}/60): {exc}")
                  time.sleep(2)
          else:
              raise SystemExit("Postgres did not become ready in time")
          PY

      - name: Run DB migrations
        run: python scripts/run_alembic_migrations.py

      - name: Initialize test database schema
        run: python scripts/ci_init_test_db.py

      - name: Run backend unit + integration tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/selenium \
            --ignore=tests/visual \
            --ignore=tests/load \
            --ignore=tests/accessibility \
            --ignore=tests/meme_splash \
            --ignore=tests/user_acceptance \
            -v \
            --tb=short \
            --junitxml=test-results/junit.xml \
            --html=test-results/report.html \
            --self-contained-html \
            --cov=backend \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=html:test-results/htmlcov

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: test-results/coverage.xml
          flags: backend
          fail_ci_if_error: false
