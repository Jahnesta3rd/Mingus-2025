name: Playwright E2E

on:
  push:
    branches: [main]
    paths:
      - "tests/e2e/**"
      - "src/**"
      - "frontend/src/**"
  pull_request:
    branches: [main]
    paths:
      - "tests/e2e/**"
      - "src/**"
      - "frontend/src/**"

jobs:
  playwright:
    name: Playwright / E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL || 'http://localhost:5173' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run HRA-06 mid-tier feature specs
        run: |
          npx playwright test tests/e2e/mid_tier_features.spec.ts \
            --project=chromium \
            --reporter=html \
            --output=playwright-results/artifacts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            playwright-results/
          retention-days: 14
